name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run deck:html
      - run: npm run deck:wide
      - run: npm run deck:pdf
      - uses: actions/upload-artifact@v4
        with:
          name: hmg-marp-dist
          path: dist/
